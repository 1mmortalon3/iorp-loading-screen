<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="dark">
  <title>Imperial Order Roleplay — Loading Screen V2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="loading-screen" aria-live="polite">
    <div class="background" aria-hidden="true"></div>
    <div class="pulse-ring ring-one" aria-hidden="true"></div>
    <div class="pulse-ring ring-two" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="scan-sweep" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <div class="panel-content">
      <div id="statusText" class="status-text">Establishing secure uplink to Imperial Center...</div>
      <div id="logText" class="log-text">Retrieving server information...</div>
    </div>

    <div class="progress-track" aria-hidden="true">
      <div id="progressFill" class="progress-fill"></div>
      <div class="progress-spark"></div>
    </div>

    <div id="percentText" class="percent-text">0%</div>
    <div id="downloadText" class="download-text">Waiting for Garry's Mod loading hooks...</div>
    <div id="serverText" class="server-text">IMPERIAL ORDER ROLEPLAY</div>
    <div id="gameModeText" class="gamemode-text">GAMEMODE // HELIX</div>
    <div id="metaRight" class="meta-right">00:00:00 GST &nbsp;&nbsp; SLOTS // ---</div>
  </main>
  <script src="loading.js"></script>
</body>
</html>
